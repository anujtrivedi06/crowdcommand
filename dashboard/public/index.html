<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="CrowdCommand — AI-native stadium crowd management platform. Real-time command dashboard for M. Chinnaswamy Stadium, Bengaluru."
    />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph -->
    <meta property="og:title" content="CrowdCommand — Stadium Command Dashboard" />
    <meta property="og:description" content="Real-time AI crowd management for M. Chinnaswamy Stadium" />
    <meta property="og:type" content="website" />

    <title>CrowdCommand — Command Dashboard</title>

    <!-- Preconnect to Google APIs for Maps and Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Critical CSS — prevents flash of unstyled content before React hydrates */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --bg-card: #1e293b;
        --border: #334155;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --accent-blue: #3b82f6;
        --accent-green: #22c55e;
        --accent-amber: #f59e0b;
        --accent-red: #ef4444;
      }

      html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        height: 100%;
        width: 100%;
      }

      /* Loading screen shown before React mounts */
      #initial-loader {
        position: fixed;
        inset: 0;
        background: var(--bg-primary);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }

      #initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loader-logo {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--text-primary);
      }

      .loader-logo span {
        color: var(--accent-blue);
      }

      .loader-subtitle {
        font-size: 13px;
        color: var(--text-secondary);
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .loader-bar {
        width: 200px;
        height: 2px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
        margin-top: 8px;
      }

      .loader-bar-fill {
        height: 100%;
        width: 40%;
        background: var(--accent-blue);
        border-radius: 2px;
        animation: loader-sweep 1.2s ease-in-out infinite;
      }

      @keyframes loader-sweep {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }

      /* Scrollbar styling for dashboard panels */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg-primary);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-secondary);
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding:40px;text-align:center;font-family:sans-serif;background:#0f172a;color:#f1f5f9;height:100vh;display:flex;align-items:center;justify-content:center;">
        <div>
          <h1 style="font-size:24px;margin-bottom:12px;">CrowdCommand requires JavaScript</h1>
          <p style="color:#94a3b8;">Please enable JavaScript to use the stadium command dashboard.</p>
        </div>
      </div>
    </noscript>

    <!-- Initial loading screen — hidden by App.js after Firebase connects -->
    <div id="initial-loader">
      <div class="loader-logo">Crowd<span>Command</span></div>
      <div class="loader-subtitle">M. Chinnaswamy Stadium · Bengaluru</div>
      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>
    </div>

    <div id="root"></div>
  </body>
</html>
